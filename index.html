<!DOCTYPE html>
<html>

<head>
    <title>...</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            background-color: rgba(0, 0, 0, 0.75);
            background-blend-mode: darken;

            font-family: "Courier New", monospace;
            text-align: center;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #d9a6ff, #7a00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow:
                0 0 5px #c084ff,
                0 0 15px #a64dff,
                0 0 30px #6a00ff,
                0 0 60px rgba(106, 0, 255, 0.6);
        }

        .botoes {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 12px;
            border: 1px solid #7a00ff;

            background: rgba(0, 0, 0, 0.6);
            color: #d9a6ff;

            box-shadow:
                0 0 10px #6a00ff,
                inset 0 0 10px rgba(122, 0, 255, 0.4);
        }

        button:hover {
            transform: scale(1.1);
        }

        .animar-centro {
            transform: scale(1.2);
        }

    </style>

</head>

<body>

    <h1 id="titulo">você me ama?</h1>

    <div class="botoes" id="botoes">
        <button id="sim" onclick="clicouSim()">Sim</button>
        <button id="nao" onclick="clicouNao()">Não</button>
    </div>

    <script>

        let cliquesNao = 0;
        let popupsAbertos = 0;
        let faseFinal = false;
        let escalaNao = 1;

        function clicouNao() {
            if (popupsAbertos > 0) return;

            cliquesNao++;

            let botao = document.getElementById("nao");

            escalaNao -= 0.3;
            botao.style.transform = "scale(" + escalaNao + ")";
            botao.style.opacity = escalaNao;

            for (let i = 0; i < 3; i++) {
                criarPopup();
            }

            if (cliquesNao >= 3) {
                faseFinal = true;
            }
        }

        function criarPopup() {
            let popup = document.createElement("div");
            popupsAbertos++;

            popup.style.position = "fixed";
            popup.style.top = Math.random() * 70 + "%";
            popup.style.left = Math.random() * 70 + "%";

            popup.style.width = "260px";
            popup.style.height = "320px";
            popup.style.borderRadius = "15px";
            popup.style.overflow = "hidden";
            popup.style.boxShadow = "0 0 25px #4c00cc";
            popup.style.zIndex = "999";
            popup.style.background = "black";
            popup.style.cursor = "move"; // 👈 indica que pode arrastar

            popup.innerHTML = `
                <div style="
                    position:absolute;
                    top:5px;
                    right:10px;
                    color:#c084ff;
                    cursor:pointer;
                " onclick="fecharPopup(this)">✖</div>

                <div style="
                    width: 100%;
                    height: 65%;
                    background-image: url('mwah.png');
                    background-size: cover;
                "></div>

                <div style="
                    height: 35%;
                    background: rgba(40, 0, 80, 0.95);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    padding: 10px;
                ">
                    <p style="color:#c084ff;">
                        oi te amo muito meu bbbezinho twink empinadinho
                    </p>
                </div>
            `;

            // 👇 lógica de arrastar
            let offsetX = 0, offsetY = 0, segurando = false;

            popup.addEventListener("mousedown", (e) => {
                segurando = true;
                offsetX = e.clientX - popup.offsetLeft;
                offsetY = e.clientY - popup.offsetTop;
            });

            document.addEventListener("mousemove", (e) => {
                if (segurando) {
                    popup.style.left = (e.clientX - offsetX) + "px";
                    popup.style.top = (e.clientY - offsetY) + "px";
                }
            });

            document.addEventListener("mouseup", () => {
                segurando = false;
            });

            document.body.appendChild(popup);
        }

        function fecharPopup(elemento) {
            let popup = elemento.parentElement;
            popup.remove();
            popupsAbertos--;

            if (popupsAbertos === 0 && faseFinal) {
                mostrarMensagemFinal();
            }
        }

        function mostrarMensagemFinal() {
            document.getElementById("titulo").innerText =
                "poxa tenha piedade do seu bbzinho";

            document.getElementById("nao")?.remove();

            let botaoSim = document.getElementById("sim");

            setTimeout(() => {
                botaoSim.classList.add("animar-centro");
            }, 50);
        }

        function clicouSim() {
            document.body.innerHTML = `
                <h1 style="
                    font-size: 42px;
                    background: linear-gradient(135deg, #d9a6ff, #7a00ff);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                ">
                    EBAEBEA UHUL TE AMO MUITCHO
                </h1>
            `;
        }

    </script>

</body>

</html>
